<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>

<div layout:fragment="content">

    <!-- Header -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">Shorten Your Links</h1>
        <p class="text-muted">Create clean, short, and shareable URLs in seconds.</p>
    </div>

    <!-- Create URL -->
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/short-urls}" method="post"
                          th:object="${createShortUrlForm}">

                        <label class="form-label fw-semibold">Original URL</label>
                        <input type="url" class="form-control form-control-lg"
                               th:field="*{originalUrl}"
                               placeholder="https://example.com">

                        <div class="d-grid mt-3">
                            <button class="btn btn-primary btn-lg">
                                🚀 Create Short URL
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <h3 class="mt-5 mb-3">🌍 Public Short URLs</h3>

    <div th:if="${#lists.isEmpty(publicShortUrls)}"
         class="alert alert-info">
        No URLs created yet.
    </div>

    <div th:unless="${#lists.isEmpty(publicShortUrls)}"
         class="table-responsive">

        <table class="table table-hover align-middle w-100">
            <thead class="table-dark">
            <tr>
                <th>Short URL</th>
                <th>Original</th>
                <th>Created</th>
                <th>Expires</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="url : ${publicShortUrls}">
                <td>
                    <a th:href="@{/s/{key}(key=${url.shortKey})}"
                       th:text="${baseUrl + '/s/' + url.shortKey}"
                       target="_blank"></a>
                </td>

                <td th:text="${#strings.abbreviate(url.originalUrl, 40)}"></td>

                <td th:text="${#temporals.format(url.createdAt, 'dd MMM yyyy')}"></td>

                <td th:text="${url.expiresAt == null
                    ? 'Never'
                    : #temporals.format(url.expiresAt, 'dd MMM yyyy')}">
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
